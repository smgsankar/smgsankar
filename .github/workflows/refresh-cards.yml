name: Refresh activity data and redeploy

on:
  schedule:
    - cron: "17 2 * * 1" # Mondays 02:17 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: node scripts/refresh-data.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit refreshed data
        run: |
          if git diff --quiet assets/ src/; then
            echo "data unchanged, nothing to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add assets/ src/calendar.json src/github-stats.json
            git commit -m "Refresh GitHub activity data"
            git push
          fi
      # Deploy runs only once the CLOUDFLARE_API_TOKEN secret is configured.
      - name: Build site
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
        run: |
          npm ci
          npm run build
      - name: Deploy to Cloudflare Pages
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
        run: npx wrangler pages deploy dist --project-name smgsankar --branch master
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 4ca609eb19d60613a0ba4636c4767046
